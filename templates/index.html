<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КПП - Камера</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚪 Контрольно-пропускной пункт</h1>
            <nav>
                <a href="/" class="active">Сканирование</a>
            </nav>
        </header>

        <main>
            <div class="scanner-section">
                <h2>Сканирование QR-кода</h2>

                <!-- Видео с камеры -->
                <video id="camera" width="100%" autoplay playsinline></video>

                <!-- Статус -->
                <div id="status" style="margin-top: 20px;">⏳ Загружаем камеру...</div>
            </div>
        </main>
    </div>

    <script>
        const video = document.getElementById('camera');
        const status = document.getElementById('status');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(function(stream) {
                video.srcObject = stream;
                status.innerHTML = '✅ Камера работает! Поднесите QR-код.';
                status.style.color = 'green';
            })
            .catch(function(error) {
                status.innerHTML = '❌ Ошибка: ' + error.message;
                status.style.color = 'red';
            });
    </script>
</body>
</html>
